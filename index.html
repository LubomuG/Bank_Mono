<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Monobank • повний екран</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- ЕКРАНИ АВТОРИЗАЦІЇ (захист від автозаповнення) -->
    <div id="auth-screen" class="screen active">
        <div class="auth-tabs">
            <button class="auth-tab active" id="login-tab">Вхід</button>
            <button class="auth-tab" id="register-tab">Реєстрація</button>
        </div>
        <!-- Форма входу -->
        <div id="login-form-container" class="auth-form active">
            <div class="login-logo"><i class="fas fa-university"></i> monobank</div>
            <input type="text" style="display:none" aria-hidden="true">
            <input type="password" style="display:none" aria-hidden="true">
            <input type="email" id="login-email" class="no-autofill" placeholder="Email" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
            <input type="password" id="login-password" class="no-autofill" placeholder="Пароль" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
            <button class="auth-btn" id="login-btn">Увійти</button>
            <p class="auth-hint">або <span id="switch-to-register">зареєструйтесь</span></p>
        </div>
        <!-- Форма реєстрації -->
        <div id="register-form-container" class="auth-form">
            <div class="login-logo"><i class="fas fa-university"></i> monobank</div>
            <input type="text" style="display:none" aria-hidden="true">
            <input type="password" style="display:none" aria-hidden="true">
            <input type="text" id="reg-name" class="no-autofill" placeholder="Ім'я" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
            <input type="email" id="reg-email" class="no-autofill" placeholder="Email" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
            <input type="password" id="reg-password" class="no-autofill" placeholder="Пароль" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
            <button class="auth-btn" id="register-btn">Зареєструватись</button>
            <p class="auth-hint">вже є акаунт? <span id="switch-to-login">увійдіть</span></p>
        </div>
    </div>

    <!-- ОСНОВНИЙ ДОДАТОК -->
    <div id="app-main" class="app-main">
        <header class="header glass">
            <div class="logo-area"><i class="fas fa-university"></i><span class="logo-text" data-i18n="appName">monobank</span></div>
            <div class="header-icons"><i class="fas fa-bell"></i><i class="fas fa-user-circle" id="userProfile"></i></div>
        </header>

        <!-- Селектор карток -->
        <div class="card-selector">
            <select id="cardSelector" class="card-select"></select>
            <button id="addCardBtn" class="glow-btn"><i class="fas fa-plus-circle"></i></button>
        </div>

        <!-- Контейнер сторінок -->
        <div id="page-container" class="page-container">
            <!-- Сторінка 1: Головна -->
            <div class="page active" id="page-home">
                <div class="card-container">
                    <div class="bank-card" id="bankCard">
                        <div class="card-top"><span class="chip"><i class="fas fa-microchip"></i></span><span class="bank-name">monobank</span></div>
                        <div class="card-number" id="cardNumber">5375 41•• •••• 1234</div>
                        <div class="card-details"><span id="cardHolder">ІВАН ІВАНЕНКО</span><span id="cardExpiry">09/25</span></div>
                        <div class="balance-row">
                            <span class="balance-label" data-i18n="totalBalance">Загальний баланс</span>
                            <div class="balance-value-wrapper">
                                <span class="balance-amount" id="mainBalance">15 240.75 ₴</span>
                                <button class="eye-toggle" id="toggleBalanceEye"><i class="fas fa-eye" id="eyeIcon"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="section-label" data-i18n="quickActions">Швидкі дії</div>
                <div class="actions-grid">
                    <button class="action-btn" data-action="withdraw"><i class="fas fa-money-bill-wave"></i><span data-i18n="withdraw">Зняти готівку</span></button>
                    <button class="action-btn" data-action="topup-card"><i class="fas fa-credit-card"></i><span data-i18n="topupCard">Поповнити карту</span></button>
                    <button class="action-btn" data-action="transfer"><i class="fas fa-exchange-alt"></i><span data-i18n="transfer">Переказати кошти</span></button>
                    <button class="action-btn" data-action="topup-phone"><i class="fas fa-mobile-alt"></i><span data-i18n="topupPhone">Поповнити телефон</span></button>
                    <button class="action-btn" data-action="pay-utilities"><i class="fas fa-building"></i><span data-i18n="payUtilit">Оплатити комуналку</span></button>
                    <button class="action-btn" data-action="view-balance"><i class="fas fa-eye"></i><span data-i18n="viewBalance">Подивитись баланс</span></button>
                    <button class="action-btn" data-action="goto-history"><i class="fas fa-history"></i><span data-i18n="history">Історія</span></button>
                    <button class="action-btn" data-action="change-limit"><i class="fas fa-chart-line"></i><span data-i18n="changeLimit">Змінити ліміт</span></button>
                </div>
            </div>
            <!-- Сторінка 2: Історія -->
            <div class="page" id="page-history">
                <div class="history-header"><h2 data-i18n="historyTitle">Історія</h2><button class="filter-btn" id="filterHistory"><i class="fas fa-filter"></i></button></div>
                <div class="history-list glass" id="historyList"></div>
                <div class="history-actions"><button class="action-btn inline-action" data-action="print-balance"><i class="fas fa-print"></i><span data-i18n="printBalance">Роздрукувати баланс</span></button></div>
            </div>
            <!-- Сторінка 3: Послуги -->
            <div class="page" id="page-services">
                <h2 class="page-title" data-i18n="services">Послуги</h2>
                <div class="actions-grid">
                    <button class="action-btn" data-action="pay-creator"><i class="fas fa-graduation-cap"></i><span data-i18n="payCreator">Оплата Creator</span></button>
                    <button class="action-btn" data-action="cash-collection"><i class="fas fa-truck"></i><span data-i18n="cashCollection">Режим інкасації</span></button>
                    <button class="action-btn" data-action="topup-phone"><i class="fas fa-mobile-alt"></i><span data-i18n="topupPhone">Поповнити телефон</span></button>
                    <button class="action-btn" data-action="pay-utilities"><i class="fas fa-building"></i><span data-i18n="payUtilit">Комуналка</span></button>
                </div>
            </div>
            <!-- Сторінка 4: Налаштування -->
            <div class="page" id="page-settings">
                <h2 class="page-title" data-i18n="settings">Налаштування</h2>
                <div class="settings-list glass">
                    <button class="settings-item" data-action="change-pin"><i class="fas fa-lock"></i><span data-i18n="changePin">Змінити ПІН</span></button>
                    <button class="settings-item" data-action="block-card"><i class="fas fa-ban"></i><span data-i18n="blockCard">Заблокувати карту</span></button>
                    <button class="settings-item" data-action="change-card-skin"><i class="fas fa-palette"></i><span data-i18n="changeSkin">Змінити скін</span></button>
                    <button class="settings-item" data-action="change-language"><i class="fas fa-language"></i><span data-i18n="changeLang">Змінити мову</span></button>
                    <button class="settings-item" data-action="toggle-balance"><i class="fas fa-eye-slash"></i><span data-i18n="toggleBalance">Показати/ховати баланс</span></button>
                    <button class="settings-item" data-action="add-card"><i class="fas fa-plus-circle"></i><span data-i18n="addCard">Додати картку</span></button>
                    <button class="settings-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span data-i18n="logout">Вийти</span></button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav glass">
            <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span data-i18n="home">Головна</span></button>
            <button class="nav-item" data-page="history"><i class="fas fa-history"></i><span data-i18n="historyTab">Історія</span></button>
            <button class="nav-item" data-page="services"><i class="fas fa-credit-card"></i><span data-i18n="servicesTab">Послуги</span></button>
            <button class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span data-i18n="settingsTab">Налаштування</span></button>
        </nav>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header"><span id="modalTitle"></span><button class="modal-close"><i class="fas fa-times"></i></button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>
<script src="./main.js"></script>
</body>
</html>
